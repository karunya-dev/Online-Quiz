<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayground-Style Online Quiz System</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      color: #fff8df;
      background: #3b0824;
    }

    main {
      width: min(720px, calc(100vw - 36px));
      padding: 36px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 0.95;
    }

    p {
      line-height: 1.7;
      color: rgba(255, 248, 223, 0.78);
    }

    code {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 6px;
      color: #3b0824;
      background: #fff8df;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Full-stack app codebase created</h1>
    <p>
      The production-style implementation is in <code>frontend/</code> and <code>backend/</code>.
      Run it with the commands documented in <code>README.md</code>.
    </p>
    <p>
      Frontend: Nuxt/Vue. Backend: Node.js/TypeScript REST API.
      Databases: PostgreSQL, MongoDB, and Redis through Docker Compose.
    </p>
  </main>
</body>
</html>
